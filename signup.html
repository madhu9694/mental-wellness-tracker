<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — Grind &amp; Glow</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <!-- ============ NAVBAR ============ -->
  <nav class="navbar">
    <div class="nav-brand">
      <a href="index.html" style="text-decoration:none;color:inherit;">🌸 Grind &amp; Glow</a>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="login.html">Log In</a>
      <button class="theme-toggle" id="themeToggle">🌙</button>
    </div>
  </nav>

  <!-- ============ AUTH PAGE ============ -->
  <div class="auth-page">

    <div class="auth-card">

      <!-- Header -->
      <div class="auth-header">
        <div class="auth-icon">🌸</div>
        <h1>Join Grind &amp; Glow</h1>
        <p>Your wellness journey starts here</p>
      </div>

     
      <form class="auth-form" id="signupForm" novalidate>

       
        <div class="form-group">
          <label for="name">Your Name</label>
          <input
            type="text"
            id="name"
            
            autocomplete="name"
          />
          <span class="form-error" id="nameError"></span>
        </div>

        <!-- Email Field -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            
            autocomplete="email"
          />
          <span class="form-error" id="emailError"></span>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="password"
              placeholder="At least 6 characters"
              autocomplete="new-password"
            />
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">👁</button>
          </div>
          <span class="form-error" id="passwordError"></span>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label for="confirm">Confirm Password</label>
          <input
            type="password"
            id="confirm"
            placeholder="Same password again"
            autocomplete="new-password"
          />
          <span class="form-error" id="confirmError"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
      </form>

      <!-- Switch to login -->
      <p class="auth-switch">
        Already have an account? <a href="login.html">Log In</a>
      </p>

    </div>


  </div>

  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
